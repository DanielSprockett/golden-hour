:root{
  --ink:#15211F;
  --ink-soft:#52645F;
  --paper:#E6E2D9;
  --card:#F6F4EF;
  --rule:#D2CCC0;
  --indigo:#2D7679;
  --rust:#D9852A;
  --moss:#3F6E5C;
  --mustard:#C99A3D;
  --font-serif:Georgia,'Times New Roman',Cambria,serif;
  --font-mono:ui-monospace,'SF Mono','Cascadia Mono','Consolas','Liberation Mono',Menlo,monospace;
  --font-sans:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}
[data-theme="dark"]{
  --ink:#ECE7DC;
  --ink-soft:#B3AC9C;
  --paper:#211D18;
  --card:#2B2620;
  --rule:#423C33;
  --indigo:#4FA8AC;
  --rust:#E2954E;
  --moss:#74A98B;
  --mustard:#E0B65A;
}
[data-theme="dark"] .text-input{background:#1A1714;color:var(--ink);}
[data-theme="dark"] .priority-tag,[data-theme="dark"] .archived-tag,[data-theme="dark"] .someday-tag{color:#15211F;}
*{box-sizing:border-box;}
html,body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--font-sans);-webkit-font-smoothing:antialiased;}
button{font-family:var(--font-sans);cursor:pointer;}
input,select,textarea{font-family:var(--font-sans);}
:focus-visible{outline:2px solid var(--indigo);outline-offset:2px;}
.hidden{display:none !important;}

#app{max-width:1080px;margin:0 auto;padding:28px 20px 90px;}

/* header */
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;border-bottom:1px solid var(--rule);padding-bottom:18px;margin-bottom:22px;}
.title-block h1{font-family:'Anton',sans-serif;font-style:normal;font-weight:400;text-transform:uppercase;font-size:84px;margin:0 0 6px;letter-spacing:0.5px;color:#C84A30;line-height:0.95;}
.subtitle{font-family:'Anton',sans-serif;font-weight:400;text-transform:uppercase;letter-spacing:0.5px;font-size:24px;color:#1E4647;}
.top-right{display:flex;align-items:flex-start;}
.brand-logo{width:204px;height:167px;display:block;object-fit:contain;}
.top-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}

/* buttons */
.btn-ghost,.btn-primary,.btn-ghost-sm,.btn-link-sm{border-radius:3px;font-size:13px;font-weight:500;border:1px solid var(--ink);background:transparent;color:var(--ink);padding:8px 14px;transition:background .12s;}
.btn-ghost:hover{background:rgba(0,0,0,0.05);}
.btn-primary{background:var(--ink);color:var(--card);}
.btn-primary:hover{background:#34392F;}
.btn-ghost-sm{padding:4px 9px;font-size:12px;border-color:var(--rule);color:var(--ink-soft);}
.btn-ghost-sm:hover{background:rgba(0,0,0,0.05);border-color:var(--ink-soft);}
.btn-link-sm{border:none;background:none;font-size:12px;color:var(--indigo);text-decoration:underline;padding:4px 4px;}
.danger{color:var(--rust);border-color:var(--rust);}

/* panels (add project / bulk add) */
.panel{background:var(--card);border:1px solid var(--rule);border-radius:4px;padding:16px;margin-bottom:18px;display:flex;flex-direction:column;gap:10px;max-width:480px;}
.text-input{width:100%;border:1px solid var(--rule);background:#fff;color:var(--ink);border-radius:3px;padding:8px 10px;font-size:13px;}
textarea.text-input{resize:vertical;font-family:var(--font-mono);font-size:12.5px;}
.form-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}
.muted-sm{font-size:12px;color:var(--ink-soft);}
.panel code{background:rgba(0,0,0,0.06);padding:1px 5px;border-radius:2px;font-family:var(--font-mono);}

/* now rail - signature element */
.now-section{margin-bottom:22px;}
.now-section-head{margin-bottom:10px;display:flex;align-items:center;gap:8px;cursor:pointer;}
.section-toggle-arrow{font-size:11px;color:var(--ink-soft);}
.now-eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:2px;color:var(--indigo);font-weight:600;}
.now-rail{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;}
.now-card{flex:0 0 220px;background:var(--card);border:1px solid var(--rule);border-top:3px solid var(--indigo);border-radius:3px;padding:14px;box-shadow:2px 2px 0 rgba(0,0,0,0.04);}
.now-stamp{display:inline-block;font-family:var(--font-mono);font-size:10.5px;letter-spacing:1.5px;font-weight:600;color:var(--indigo);border:1.5px solid var(--indigo);border-radius:2px;padding:1px 6px;transform:rotate(-2deg);margin-bottom:8px;}
.now-project{font-size:11px;color:var(--ink-soft);margin-bottom:2px;text-transform:uppercase;letter-spacing:0.5px;}
.now-step{font-family:var(--font-serif);font-size:16px;margin-bottom:10px;line-height:1.25;}
.now-actions{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.now-empty{font-size:13px;color:var(--ink-soft);padding:16px;background:var(--card);border:1px dashed var(--rule);border-radius:4px;}

/* overview dashboard */
.overview-section{margin-bottom:22px;}
.overview-section-head{display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:10px;}
.overview-eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:2px;color:var(--ink-soft);font-weight:600;}
.overview-card{background:var(--card);border:1px solid var(--rule);border-radius:4px;padding:16px;}
.overview-counts{font-family:var(--font-mono);font-size:12px;color:var(--ink-soft);display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px;}
.dot{color:var(--rule);}
.stat-indigo{color:var(--indigo);font-weight:600;}
.stat-rust{color:var(--rust);font-weight:600;}
.stat-mustard{color:var(--mustard);font-weight:600;}
.stat-moss{color:var(--moss);font-weight:600;}
.progress-track{height:8px;background:var(--rule);border-radius:4px;overflow:hidden;margin-bottom:14px;}
.progress-fill{height:100%;background:var(--moss);border-radius:4px;}
.overview-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;}
.overview-list-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--ink-soft);margin-bottom:6px;font-weight:600;}
.overview-list-item{font-size:12.5px;padding:5px 0;border-top:1px solid var(--rule);display:flex;justify-content:space-between;gap:8px;align-items:center;}
.overview-list-item:first-child{border-top:none;}
.overview-list-empty{font-size:12px;color:var(--ink-soft);font-style:italic;}

/* due dates */
.due-line{font-size:11.5px;margin-top:3px;}
.due-overdue{color:var(--rust);font-weight:600;}
.due-soon{color:var(--mustard);font-weight:600;}
.due-stale-title{color:var(--ink-soft);font-weight:600;}
.due-later{color:var(--ink-soft);}

/* project mini progress */
.project-progress-track{width:54px;height:5px;background:var(--rule);border-radius:3px;overflow:hidden;flex:0 0 auto;}
.project-progress-fill{height:100%;background:var(--moss);display:block;}
.project-due{font-family:var(--font-mono);font-size:11px;}

@media (max-width:640px){
  .overview-grid{grid-template-columns:1fr;}
}

/* filter bar */
.filter-bar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px;}
.filter-bar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.area-filters{display:flex;gap:6px;flex-wrap:wrap;}
.area-filter-btn{border:1px solid var(--rule);background:transparent;color:var(--ink-soft);font-size:12px;padding:5px 11px;border-radius:14px;}
.area-filter-btn.active{background:var(--ink);color:var(--card);border-color:var(--ink);}
.search-input{max-width:240px;}

/* projects list */
.empty-state{text-align:center;padding:40px 20px;color:var(--ink-soft);display:flex;flex-direction:column;align-items:center;gap:10px;}
.project-row{border-top:1px solid var(--rule);}
.project-row:last-child{border-bottom:1px solid var(--rule);}
.project-head{padding:13px 4px;cursor:pointer;}
.project-head-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.project-head-stats{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:6px;padding-left:22px;font-family:var(--font-mono);font-size:11px;}
.arrow{font-size:11px;color:var(--ink-soft);width:12px;}
.project-name{font-family:var(--font-sans);font-weight:600;font-size:16px;}
.area-tag{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--ink-soft);border:1px solid var(--rule);border-radius:2px;padding:1px 6px;}
.task-type-tag{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--ink-soft);border:1px solid var(--rule);border-radius:2px;padding:1px 6px;margin-left:6px;}
.priority-tag{font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:0.5px;color:#fff;background:var(--rust);border-radius:2px;padding:1px 6px;margin-left:6px;}
.archived-tag{font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:0.5px;color:#fff;background:var(--ink-soft);border-radius:2px;padding:1px 6px;margin-left:6px;}
.someday-tag{font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:0.5px;color:#fff;background:var(--indigo);border-radius:2px;padding:1px 6px;margin-left:6px;}
.project-row.is-archived{opacity:0.6;}
.doc-link{text-decoration:none;}
.project-controls{display:flex;gap:6px;margin-left:auto;}
.project-body{padding:0 4px 16px 26px;}
.project-notes{font-size:13px;color:var(--ink-soft);margin-bottom:10px;font-style:italic;}
.steps-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
.step-row{display:flex;gap:12px;align-items:flex-start;background:var(--card);border:1px solid var(--rule);border-radius:3px;padding:10px 12px;}
.step-stamp{flex:0 0 auto;font-family:var(--font-mono);font-size:10px;letter-spacing:1px;font-weight:600;border:1.5px solid;border-radius:2px;padding:2px 6px;white-space:nowrap;margin-top:1px;}
.step-main{flex:1;min-width:0;}
.step-name{font-size:14px;font-weight:500;}
.dep-line{font-size:11.5px;margin-top:3px;}
.dep-blocked{color:var(--rust);}
.dep-met{color:var(--moss);}
.dep-waiting{color:var(--mustard);}
.step-notes{font-size:12px;color:var(--ink-soft);margin-top:4px;}
.step-controls{display:flex;gap:6px;flex:0 0 auto;}

/* step form */
.step-form{background:#fff;border:1px solid var(--rule);border-radius:4px;padding:14px;margin-top:10px;display:flex;flex-direction:column;gap:9px;max-width:420px;}
.dep-picker-label{font-size:12px;color:var(--ink-soft);margin-bottom:4px;}
.dep-checklist{max-height:140px;overflow-y:auto;border:1px solid var(--rule);border-radius:3px;padding:8px;margin-top:6px;background:var(--paper);}
.dep-group-title{font-family:var(--font-mono);font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:var(--ink-soft);margin:6px 0 3px;}
.dep-option{display:flex;align-items:center;gap:6px;font-size:12.5px;padding:2px 0;}

/* modal */
.app-footer{text-align:center;font-size:12px;color:var(--ink-soft);opacity:0.7;margin-top:36px;padding-top:18px;border-top:1px solid var(--rule);}
.confetti-piece{position:fixed;width:7px;height:7px;border-radius:2px;pointer-events:none;z-index:200;animation:confetti-burst 0.8s ease-out forwards;}
@keyframes confetti-burst{
  0%{transform:translate(0,0) rotate(0deg);opacity:1;}
  100%{transform:translate(var(--dx),var(--dy)) rotate(260deg);opacity:0;}
}
.due-stale{color:var(--ink-soft);font-style:italic;}
#print-report-container{display:none;}

  body.printing-report{background:#fff !important;}
  body.printing-report > *:not(#print-report-container){display:none !important;}

  .brand-logo{width:159px;height:130px;}
  .title-block h1{font-size:51px;}
  .subtitle{font-size:17px;}

<body>
<div id="app"></div>
<div id="print-report-container"></div>
<script>
const STORAGE_KEY = 'research-ledger-offline-v1';
let state = { projects: [], steps: [], theme: 'light', settings: { staleDays: 14, googleClientId: '', driveSyncEnabled: false } };
const ui = { areaFilter: 'all', searchQuery: '', expanded: new Set(), showArchived: false, showCompletedTasks: false, showSomeday: false, nowRailCollapsed: false, summaryCollapsed: true };

function escapeHtml(str){
  return String(str == null ? '' : str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function uid(prefix){ return prefix + '_' + Math.random().toString(36).slice(2,10); }

/* ---- status logic ---- */
function isDone(step){ return step.status === 'done'; }
function isWaiting(step){ return step.status === 'waiting_external'; }
function unmetDeps(step){
  return (step.depends_on||[]).map(id => state.steps.find(s=>s.id===id)).filter(Boolean).filter(d => d.status !== 'done');
}
function metDeps(step){
  return (step.depends_on||[]).map(id => state.steps.find(s=>s.id===id)).filter(Boolean).filter(d => d.status === 'done');
}
function isBlocked(step){ if (isDone(step) || isWaiting(step)) return false; return unmetDeps(step).length > 0; }
function isActionable(step){ if (isDone(step) || isWaiting(step)) return false; return unmetDeps(step).length === 0; }
function statusLabel(step){
  if (isDone(step)) return 'DONE';
  if (isWaiting(step)) return 'STALLED';
  if (isBlocked(step)) return 'HELD UP';
  return step.status === 'in_progress' ? 'IN THE WORKS' : 'READY';
}
function statusColor(step){
  if (isDone(step)) return 'var(--moss)';
  if (isWaiting(step)) return 'var(--mustard)';
  if (isBlocked(step)) return 'var(--rust)';
  return 'var(--indigo)';
}
function projectOf(step){ return state.projects.find(p=>p.id===step.project_id); }
function isArchivedProject(p){ return !!(p && p.archived); }
function isSomedayProject(p){ return !!(p && p.someday); }
function isInactiveProject(p){ return isArchivedProject(p) || isSomedayProject(p); }

/* ---- due date logic ---- */
function todayISO(){ return new Date().toISOString().slice(0,10); }
function isOverdue(step){ return !!step.due_date && !isDone(step) && step.due_date < todayISO(); }
function isStale(step){
  if (isDone(step) || isInactiveProject(projectOf(step))) return false;
  if (!step.updated_at) return false;
  const last = new Date(step.updated_at + 'T00:00:00');
  const today = new Date(todayISO() + 'T00:00:00');
  const diffDays = Math.round((today - last) / 86400000);
  return diffDays >= state.settings.staleDays;
}
function isDueSoon(step){
  if (!step.due_date || isDone(step) || isOverdue(step)) return false;
  const due = new Date(step.due_date + 'T00:00:00');
  const today = new Date(todayISO() + 'T00:00:00');
  const diffDays = Math.round((due - today) / 86400000);
  return diffDays >= 0 && diffDays <= 7;
}
function formatDate(dateStr){
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString(undefined, { month:'short', day:'numeric' });
}
function dueLineHtml(step, prefix){
  if (!step.due_date) return '';
  const cls = isOverdue(step) ? 'due-overdue' : isDueSoon(step) ? 'due-soon' : 'due-later';
  const label = isOverdue(step) ? 'overdue ' : (prefix || 'due ');
  return `<div class="due-line ${cls}">${label}${formatDate(step.due_date)}</div>`;
}
function taskTypeLabel(type){
  const map = { coding:'Coding', lab:'Lab', analysis:'Analysis', writing:'Writing', follow_up:'Follow-Up', create:'Create' };
  return map[type] || '';
}

/* ---- priority logic (lower number = higher priority; blank sorts last) ---- */
function priorityValue(p){
  const n = Number(p);
  return (p === null || p === undefined || p === '' || isNaN(n)) ? Infinity : n;
}
function priorityTagHtml(p){
  const v = priorityValue(p);
  if (v === Infinity) return '';
  return `<span class="priority-tag">P${escapeHtml(String(p))}</span>`;
}

/* ---- persistence ---- */
async function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw){
      const parsed = JSON.parse(raw);
      if (parsed && Array.isArray(parsed.projects) && Array.isArray(parsed.steps)) state = parsed;
    }
  }catch(e){
    state = { projects: [], steps: [], theme: 'light', settings: { staleDays: 14 } };
  }
  migrateState();
}
function migrateState(){
  if (!state.theme) state.theme = 'light';
  if (!state.settings) state.settings = { staleDays: 14, googleClientId: '', driveSyncEnabled: false };
  if (!state.settings.staleDays) state.settings.staleDays = 14;
  if (state.settings.googleClientId === undefined) state.settings.googleClientId = '';
  if (state.settings.driveSyncEnabled === undefined) state.settings.driveSyncEnabled = false;
  const today = new Date().toISOString().slice(0,10);
  state.steps.forEach(s => { if (!s.updated_at) s.updated_at = today; });
}
async function saveState(){
  state.synced_at = new Date().toISOString();
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch(e){ console.error('Save failed', e); }
  driveWriteIfEnabled();
}

/* ---- Google Drive sync ---- */
const DRIVE_FILE_NAME = 'golden-hour-data.json';
const DRIVE_FILE_ID_KEY = 'golden-hour-drive-file-id';
let driveToken = null;
let driveTokenExpiry = 0;

function driveTokenValid(){ return !!(driveToken && Date.now() < driveTokenExpiry - 60000); }

function driveRequestToken(interactive){
  return new Promise((resolve, reject) => {
    if (!window.google?.accounts?.oauth2){ reject(new Error('Drive library not loaded yet')); return; }
    if (!state.settings.googleClientId){ reject(new Error('No Client ID set')); return; }
    const client = window.google.accounts.oauth2.initTokenClient({
      client_id: state.settings.googleClientId,
      scope: 'https://www.googleapis.com/auth/drive.file',
      callback: (resp) => {
        if (resp.error){ reject(new Error(resp.error)); return; }
        driveToken = resp.access_token;
        driveTokenExpiry = Date.now() + (parseInt(resp.expires_in, 10) * 1000);
        resolve(driveToken);
      },
      error_callback: (err) => { reject(new Error(err?.type || 'token_error')); }
    });
    client.requestAccessToken({ prompt: interactive ? '' : 'none' });
  });
}

async function driveEnsureToken(interactive){ return driveTokenValid() ? driveToken : driveRequestToken(interactive); }

async function driveFindFile(){
  const cached = localStorage.getItem(DRIVE_FILE_ID_KEY);
  if (cached) return cached;
  const q = encodeURIComponent(`name='${DRIVE_FILE_NAME}' and trashed=false`);
  const resp = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)&spaces=drive`,
    { headers: { Authorization: `Bearer ${driveToken}` } });
  const data = await resp.json();
  if (data.files?.length){ localStorage.setItem(DRIVE_FILE_ID_KEY, data.files[0].id); return data.files[0].id; }
  return null;
}

async function driveCreateFile(){
  const meta = { name: DRIVE_FILE_NAME, mimeType: 'application/json' };
  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
  form.append('media', new Blob([JSON.stringify(state)], { type: 'application/json' }));
  const resp = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',
    { method: 'POST', headers: { Authorization: `Bearer ${driveToken}` }, body: form });
  const data = await resp.json();
  if (data.id) localStorage.setItem(DRIVE_FILE_ID_KEY, data.id);
  return data.id;
}

async function driveReadState(){
  const fileId = await driveFindFile();
  if (!fileId) return null;
  const resp = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
    { headers: { Authorization: `Bearer ${driveToken}` } });
  if (!resp.ok){ localStorage.removeItem(DRIVE_FILE_ID_KEY); return null; }
  return await resp.json();
}

async function driveWriteState(){
  let fileId = await driveFindFile();
  if (!fileId){ await driveCreateFile(); return; }
  await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`,
    { method: 'PATCH', headers: { Authorization: `Bearer ${driveToken}`, 'Content-Type': 'application/json' }, body: JSON.stringify(state) });
}

function driveWriteIfEnabled(){
  if (!state.settings.driveSyncEnabled || !state.settings.googleClientId || !driveTokenValid()) return;
  driveWriteState().catch(e => console.warn('Drive background write failed:', e));
}

function setDriveStatusEl(msg, isError){
  const el = document.getElementById('drive-sync-status');
  if (!el) return;
  el.textContent = msg;
  el.style.color = isError ? 'var(--rust)' : 'var(--ink-soft)';
}

async function driveConnectAndSync(){
  const clientId = document.getElementById('drive-client-id-input')?.value.trim();
  if (clientId) state.settings.googleClientId = clientId;
  setDriveStatusEl('Connecting to Google…');
  try{
    await driveEnsureToken(true);
    state.settings.driveSyncEnabled = true;
    await driveMergeAndSync();
    openSettingsModal(); // refresh modal to show connected state
  } catch(e){
    setDriveStatusEl('Could not connect: ' + e.message, true);
  }
}

async function driveSyncNow(){
  setDriveStatusEl('Syncing…');
  try{
    await driveEnsureToken(true);
    await driveMergeAndSync();
    openSettingsModal();
  } catch(e){
    setDriveStatusEl('Sync failed: ' + e.message, true);
  }
}

async function driveMergeAndSync(){
  const remote = await driveReadState();
  if (remote && Array.isArray(remote.projects) && Array.isArray(remote.steps)){
    const localTime = state.synced_at || '';
    const remoteTime = remote.synced_at || '';
    if (remoteTime > localTime){
      const clientId = state.settings.googleClientId;
      state = remote;
      state.settings.googleClientId = clientId; // keep local client ID
      state.settings.driveSyncEnabled = true;
      migrateState();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      renderAll();
      applyTheme();
    }
  }
  state.synced_at = new Date().toISOString();
  await driveWriteState();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  const t = new Date(state.synced_at).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
  setDriveStatusEl('Synced at ' + t);
}

function driveDisconnect(){
  state.settings.driveSyncEnabled = false;
  state.settings.googleClientId = '';
  driveToken = null;
  driveTokenExpiry = 0;
  localStorage.removeItem(DRIVE_FILE_ID_KEY);
  saveState();
  openSettingsModal();
}

async function driveTrySilentSync(){
  if (!state.settings.driveSyncEnabled || !state.settings.googleClientId) return;
  try{
    await driveEnsureToken(false);
    await driveMergeAndSync();
  } catch(e){
    // Silent failure — user can reconnect manually via Settings
    console.warn('Silent Drive sync failed (token may need refresh):', e.message);
  }
}

/* ---- now rail ---- */
function renderNowRail(){
  const el = document.getElementById('now-rail');
  const actionable = state.steps.filter(s => isActionable(s) && !isInactiveProject(projectOf(s)));
  actionable.sort((a,b)=>{
    const aOver = isOverdue(a), bOver = isOverdue(b);
    if (aOver !== bOver) return aOver ? -1 : 1;
    const aProj = projectOf(a), bProj = projectOf(b);
    const aProjPri = priorityValue(aProj ? aProj.priority : null);
    const bProjPri = priorityValue(bProj ? bProj.priority : null);
    if (aProjPri !== bProjPri) return aProjPri - bProjPri;
    const aTaskPri = priorityValue(a.priority);
    const bTaskPri = priorityValue(b.priority);
    if (aTaskPri !== bTaskPri) return aTaskPri - bTaskPri;
    if (a.due_date && b.due_date && a.due_date !== b.due_date) return a.due_date < b.due_date ? -1 : 1;
    if (a.due_date && !b.due_date) return -1;
    if (!a.due_date && b.due_date) return 1;
    if (a.status !== b.status) return a.status === 'in_progress' ? -1 : 1;
    return a.name.localeCompare(b.name);
  });
  if (actionable.length === 0){
    el.innerHTML = '<div class="now-empty">All clear for now.</div>';
    return;
  }
  el.innerHTML = actionable.map(step => {
    const proj = projectOf(step);
    return `
      <div class="now-card">
        <div class="now-stamp">${step.status === 'in_progress' ? 'IN THE WORKS' : 'READY'}</div>
        <div class="now-project">${escapeHtml(proj ? proj.name : 'Unknown project')}</div>
        <div class="now-step">${escapeHtml(step.name)}${priorityTagHtml(step.priority)}${step.task_type ? `<span class="task-type-tag">${taskTypeLabel(step.task_type)}</span>` : ''}</div>
        ${dueLineHtml(step)}
        <div class="now-actions">
          ${step.status !== 'in_progress' ? `<button data-action="quick-status" data-id="${step.id}" data-status="in_progress" class="btn-ghost-sm">Start</button>` : ''}
          <button data-action="quick-status" data-id="${step.id}" data-status="done" class="btn-ghost-sm">Mark done</button>

        </div>
      </div>`;
  }).join('');
}

/* ---- overview dashboard ---- */
function renderOverview(){
  const el = document.getElementById('overview-panel');
  const activeProjects = state.projects.filter(p => !isInactiveProject(p));
  const activeSteps = state.steps.filter(s => !isInactiveProject(projectOf(s)));
  const totalSteps = activeSteps.length;
  const ready = activeSteps.filter(isActionable).length;
  const blocked = activeSteps.filter(isBlocked).length;
  const waiting = activeSteps.filter(isWaiting).length;
  const done = activeSteps.filter(isDone).length;
  const pct = totalSteps ? Math.round((done/totalSteps)*100) : 0;
  const overdue = activeSteps.filter(isOverdue).sort((a,b)=>a.due_date<b.due_date?-1:1);
  const dueSoon = activeSteps.filter(isDueSoon).sort((a,b)=>a.due_date<b.due_date?-1:1);
  const stale = activeSteps.filter(isStale).sort((a,b)=> (a.updated_at||'') < (b.updated_at||'') ? -1 : 1);

  const dueListHtml = (list, emptyText) => {
    if (list.length === 0) return `<div class="overview-list-empty">${emptyText}</div>`;
    const shown = list.slice(0,6).map(s=>{
      const proj = projectOf(s);
      return `<div class="overview-list-item">
        <span>${escapeHtml(s.name)} <span class="muted-sm">(${escapeHtml(proj?proj.name:'—')})</span></span>
        <button data-action="jump-to-project" data-id="${proj?proj.id:''}" class="btn-link-sm">${formatDate(s.due_date)}</button>
      </div>`;
    }).join('');
    const more = list.length > 6 ? `<div class="muted-sm">+${list.length-6} more</div>` : '';
    return shown + more;
  };

  const staleListHtml = (list, emptyText) => {
    if (list.length === 0) return `<div class="overview-list-empty">${emptyText}</div>`;
    const shown = list.slice(0,6).map(s=>{
      const proj = projectOf(s);
      return `<div class="overview-list-item">
        <span>${escapeHtml(s.name)} <span class="muted-sm">(${escapeHtml(proj?proj.name:'—')})</span></span>
        <button data-action="jump-to-project" data-id="${proj?proj.id:''}" class="btn-link-sm">since ${formatDate(s.updated_at)}</button>
      </div>`;
    }).join('');
    const more = list.length > 6 ? `<div class="muted-sm">+${list.length-6} more</div>` : '';
    return shown + more;
  };

  el.innerHTML = `
    <div class="overview-counts">
      <span>${activeProjects.length} project${activeProjects.length===1?'':'s'}</span><span class="dot">·</span>
      <span>${totalSteps} task${totalSteps===1?'':'s'}</span><span class="dot">·</span>
      <span class="stat-indigo">${ready} ready</span><span class="dot">·</span>
      <span class="stat-rust">${blocked} held up</span><span class="dot">·</span>
      <span class="stat-mustard">${waiting} stalled</span><span class="dot">·</span>
      <span class="stat-moss">${done} done (${pct}%)</span>
    </div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="overview-grid">
      <div>
        <div class="overview-list-title due-overdue">Overdue</div>
        ${dueListHtml(overdue, 'Nothing overdue.')}
      </div>
      <div>
        <div class="overview-list-title due-soon">Due in the next 7 days</div>
        ${dueListHtml(dueSoon, 'Nothing due soon.')}
      </div>
      <div>
        <div class="overview-list-title due-stale-title">Hasn't moved in a while</div>
        ${staleListHtml(stale, 'Everything\'s moving along.')}
      </div>
    </div>
  `;
}

/* ---- projects list ---- */
function renderProjectsList(){
  const el = document.getElementById('projects-list');
  if (state.projects.length === 0){
    el.innerHTML = `<div class="empty-state">
      <p>No projects yet.</p>
      <div class="form-actions">
        <button data-action="open-bulk-add" class="btn-primary">Bulk add projects</button>
        <button data-action="open-add-project" class="btn-ghost">Add one project</button>
      </div>
    </div>`;
    return;
  }
  const rank = p => isArchivedProject(p) ? 2 : (isSomedayProject(p) ? 1 : 0);
  const sorted = [...state.projects].sort((a,b)=>{
    const ra = rank(a), rb = rank(b);
    if (ra !== rb) return ra - rb;
    const pa = priorityValue(a.priority), pb = priorityValue(b.priority);
    if (pa !== pb) return pa - pb;
    return a.name.localeCompare(b.name);
  });
  el.innerHTML = sorted.map(renderProjectRow).join('');
  applyFilters();
  updateExpandAllButton();
  updateVisibilityToggleButtons();
}

function triggerConfetti(x, y){
  const colors = ['var(--indigo)', 'var(--rust)', 'var(--moss)', 'var(--mustard)'];
  for (let i = 0; i < 14; i++){
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const angle = Math.random() * Math.PI * 2;
    const dist = 40 + Math.random() * 60;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist - 30;
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.style.background = colors[i % colors.length];
    el.style.setProperty('--dx', dx + 'px');
    el.style.setProperty('--dy', dy + 'px');
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 850);
  }
}

function updateVisibilityToggleButtons(){

function printProjectReport(id){
  const p = state.projects.find(pr=>pr.id===id);

  const steps = [...state.steps.filter(s=>s.project_id===id)].sort((a,b)=>{
    const pa = priorityValue(a.priority), pb = priorityValue(b.priority);
    if (pa !== pb) return pa - pb;
    return a.name.localeCompare(b.name);
  });
  const done = steps.filter(isDone).length;
  const pct = steps.length ? Math.round((done/steps.length)*100) : 0;
  const today = new Date().toLocaleDateString(undefined, { year:'numeric', month:'long', day:'numeric' });
  const container = document.getElementById('print-report-container');
  container.innerHTML = `
    <h1>${escapeHtml(p.name)}</h1>
    <div class="print-meta">
      ${p.area} project${p.priority ? ' · priority ' + escapeHtml(String(p.priority)) : ''} · ${pct}% complete (${done}/${steps.length} tasks)<br>
      ${p.doc_link ? 'Linked doc: ' + escapeHtml(p.doc_link) + '<br>' : ''}

    ${p.notes ? `<p>${escapeHtml(p.notes)}</p>` : ''}

      <thead><tr><th>Task</th><th>Type</th><th>Status</th><th>Due</th><th>Notes</th></tr></thead>
      <tbody>
        ${steps.map(s => `<tr><td>${escapeHtml(s.name)}</td><td>${escapeHtml(taskTypeLabel(s.task_type) || '')}</td><td>${escapeHtml(statusLabel(s))}</td><td>${s.due_date ? escapeHtml(formatDate(s.due_date)) : ''}</td><td>${escapeHtml(s.notes || '')}</td></tr>`).join('')}
      </tbody>
    </table>
  `;
  document.body.classList.add('printing-report');
  window.print();
}

function renderStepRow(s){
  const label = statusLabel(s);
  const color = statusColor(s);
  const unmet = unmetDeps(s);
  const met = metDeps(s);
  let depLine = '';
  if (unmet.length > 0) depLine = `<div class="dep-line dep-blocked">held up by: ${unmet.map(d=>escapeHtml(d.name)).join(', ')}</div>`;
  else if (met.length > 0) depLine = `<div class="dep-line dep-met">depends on: ${met.map(d=>escapeHtml(d.name)).join(', ')} (complete)</div>`;
  const staleLine = isStale(s) ? `<div class="dep-line due-stale">hasn't moved in ${state.settings.staleDays}+ days</div>` : '';
  return `
    <div class="step-row" id="step-${s.id}" data-done="${isDone(s) ? 'true' : 'false'}" data-search="${escapeHtml(s.name.toLowerCase())}">
      <div class="step-stamp" style="color:${color};border-color:${color}">${label}</div>
      <div class="step-main">
        <div class="step-name">${escapeHtml(s.name)}${priorityTagHtml(s.priority)}${s.task_type ? `<span class="task-type-tag">${taskTypeLabel(s.task_type)}</span>` : ''}</div>

      </div>
      <div class="step-controls">
        ${s.doc_link ? `<a href="${escapeHtml(s.doc_link)}" target="_blank" rel="noopener noreferrer" class="btn-ghost-sm doc-link">Link ↗</a>` : ''}

}

/* ---- step form ---- */
function openStepForm(projectId, stepId){
  document.querySelectorAll('.step-form-container').forEach(c=>c.innerHTML='');
  const container = document.getElementById('step-form-container-' + projectId);
  if (!container) return;
  const editing = stepId ? state.steps.find(s=>s.id===stepId) : null;
  const otherSteps = state.steps.filter(s=>s.id !== stepId);
  const byProject = {};
  otherSteps.forEach(s=>{
    const proj = projectOf(s);
    const pname = proj ? proj.name : 'Unknown';
    if (!byProject[pname]) byProject[pname] = [];
    byProject[pname].push(s);
  });
  const groupNames = Object.keys(byProject).sort();
  const checklistHtml = groupNames.length ? groupNames.map(pname => `
    <div class="dep-group">
      <div class="dep-group-title">${escapeHtml(pname)}</div>
      ${byProject[pname].map(s => `
        <label class="dep-option" data-dep-label="${escapeHtml(s.name.toLowerCase())}">
          <input type="checkbox" value="${s.id}" ${editing && editing.depends_on && editing.depends_on.includes(s.id) ? 'checked' : ''}>
          ${escapeHtml(s.name)}
        </label>
      `).join('')}
    </div>
  `).join('') : '<div class="muted-sm">No other tasks yet to depend on.</div>';

  container.innerHTML = `
    <div class="step-form">
      <input type="text" class="text-input step-name-input" placeholder="Task name" value="${editing ? escapeHtml(editing.name) : ''}">
      <select class="text-input step-type-select">
        <option value="coding" ${editing && editing.task_type==='coding'?'selected':''}>Coding</option>
        <option value="lab" ${editing && editing.task_type==='lab'?'selected':''}>Lab</option>
        <option value="analysis" ${editing && editing.task_type==='analysis'?'selected':''}>Analysis</option>
        <option value="writing" ${editing && editing.task_type==='writing'?'selected':''}>Writing</option>
        <option value="follow_up" ${editing && editing.task_type==='follow_up'?'selected':''}>Follow-Up</option>
        <option value="create" ${editing && editing.task_type==='create'?'selected':''}>Create</option>
      </select>
      <select class="text-input step-status-select">
        <option value="not_started" ${editing && editing.status==='not_started'?'selected':''}>Not started</option>
        <option value="in_progress" ${editing && editing.status==='in_progress'?'selected':''}>In the works</option>
        <option value="waiting_external" ${editing && editing.status==='waiting_external'?'selected':''}>Stalled (external / manual)</option>
        <option value="done" ${editing && editing.status==='done'?'selected':''}>Done</option>
      </select>
      <div>
        <div class="muted-sm" style="margin-bottom:4px;">Priority (optional, lower number = higher priority)</div>
        <input type="number" class="text-input step-priority-input" placeholder="e.g. 1" min="1" step="1" value="${editing && editing.priority ? escapeHtml(String(editing.priority)) : ''}">
      </div>
      <div>
        <div class="muted-sm" style="margin-bottom:4px;">Due date (optional)</div>
        <input type="date" class="text-input step-due-input" value="${editing && editing.due_date ? editing.due_date : ''}">
      </div>
      <input type="url" class="text-input step-doclink" placeholder="Link (optional)" value="${editing && editing.doc_link ? escapeHtml(editing.doc_link) : ''}">
      <div class="waiting-reason-field ${editing && editing.status==='waiting_external' ? '' : 'hidden'}">
        <input type="text" class="text-input step-waiting-reason" placeholder="Stalled on what, exactly?" value="${editing && editing.waiting_reason ? escapeHtml(editing.waiting_reason) : ''}">
      </div>
      <div class="dep-picker">
        <div class="dep-picker-label">Depends on (this task stays blocked until those are done):</div>
        <input type="text" class="text-input dep-search" placeholder="Search tasks...">
        <div class="dep-checklist">${checklistHtml}</div>
      </div>
      <textarea class="text-input step-notes-input" placeholder="Notes (optional)" rows="2">${editing && editing.notes ? escapeHtml(editing.notes) : ''}</textarea>
      <div class="form-actions">
        <button data-action="save-step" data-project-id="${projectId}" data-step-id="${stepId||''}" class="btn-primary">Save task</button>
        <button data-action="cancel-step-form" data-id="${projectId}" class="btn-ghost">Cancel</button>
      </div>
    </div>
  `;
  const depSearch = container.querySelector('.dep-search');
  depSearch.addEventListener('input', () => {
    const q = depSearch.value.toLowerCase();
    container.querySelectorAll('.dep-option').forEach(label => {
      label.style.display = label.dataset.depLabel.includes(q) ? '' : 'none';
    });
  });
  const statusSelect = container.querySelector('.step-status-select');
  statusSelect.addEventListener('change', () => {
    container.querySelector('.waiting-reason-field').classList.toggle('hidden', statusSelect.value !== 'waiting_external');
  });
  container.querySelector('.step-name-input').focus();
}

function saveStepForm(projectId, stepId){
  const container = document.getElementById('step-form-container-' + projectId);
  if (!container) return;
  const name = container.querySelector('.step-name-input').value.trim();
  if (!name){ alert('Task needs a name.'); return; }
  const taskType = container.querySelector('.step-type-select').value;
  const priority = container.querySelector('.step-priority-input').value.trim();
  const status = container.querySelector('.step-status-select').value;
  const dueDate = container.querySelector('.step-due-input').value || '';
  const docLink = container.querySelector('.step-doclink').value.trim();
  const waitingReason = container.querySelector('.step-waiting-reason').value.trim();
  const notes = container.querySelector('.step-notes-input').value.trim();
  const dependsOn = Array.from(container.querySelectorAll('.dep-checklist input[type=checkbox]:checked')).map(cb=>cb.value);
  const today = todayISO();
  let becameDone = false;

  if (stepId){
    const step = state.steps.find(s=>s.id===stepId);
    if (step){
      becameDone = status === 'done' && step.status !== 'done';
      Object.assign(step, { name, task_type: taskType, priority, status, due_date: dueDate, doc_link: docLink, waiting_reason: waitingReason, notes, depends_on: dependsOn, updated_at: today });
    }
  } else {
    becameDone = status === 'done';
    state.steps.push({ id: uid('step'), project_id: projectId, name, task_type: taskType, priority, status, due_date: dueDate, doc_link: docLink, waiting_reason: waitingReason, notes, depends_on: dependsOn, updated_at: today });
  }
  ui.expanded.add(projectId);
  saveState();
  renderAll();
  if (becameDone){
    const btn = container.querySelector('[data-action="save-step"]');
    if (btn){ const r = btn.getBoundingClientRect(); triggerConfetti(r.left + r.width/2, r.top + r.height/2); }
  }
}

/* ---- project actions ---- */
function saveNewProject(){
  const name = document.getElementById('new-project-name').value.trim();
  if (!name){ alert('Project needs a name.'); return; }
  const area = document.getElementById('new-project-area').value;
  const priorityRaw = document.getElementById('new-project-priority').value.trim();
  const priority = priorityRaw === '' ? '' : priorityRaw;
  const docLink = document.getElementById('new-project-doclink').value.trim();
  const notes = document.getElementById('new-project-notes').value.trim();
  state.projects.push({ id: uid('proj'), name, area, priority, doc_link: docLink, notes });
  saveState();
  document.getElementById('new-project-name').value = '';
  document.getElementById('new-project-priority').value = '';
  document.getElementById('new-project-doclink').value = '';
  document.getElementById('new-project-notes').value = '';
  document.getElementById('add-project-panel').classList.add('hidden');
  renderAll();
}

function saveBulkAdd(){
  const raw = document.getElementById('bulk-add-textarea').value;
  const lines = raw.split('\n').map(l=>l.trim()).filter(Boolean);
  const validAreas = ['research','grants','writing','personal','creative'];
  lines.forEach(line=>{
    const parts = line.split(',');
    const name = parts[0].trim();
    if (!name) return;
    let area = (parts[1]||'research').trim().toLowerCase();
    if (!validAreas.includes(area)) area = 'research';
    const priorityRaw = (parts[2]||'').trim();
    const priority = (priorityRaw !== '' && !isNaN(Number(priorityRaw))) ? priorityRaw : '';
    state.projects.push({ id: uid('proj'), name, area, priority, doc_link: '', notes: '' });
  });
  saveState();
  document.getElementById('bulk-add-panel').classList.add('hidden');
  renderAll();
}

function deleteProject(id){
  if (!confirm("Heads up — this can't be undone. Delete this project and all its tasks?")) return;
  state.projects = state.projects.filter(p=>p.id!==id);
  state.steps = state.steps.filter(s=>s.project_id!==id);
  ui.expanded.delete(id);
  saveState();
  renderAll();
}

function openProjectEditForm(id){
  document.querySelectorAll('.project-edit-container').forEach(c=>c.innerHTML='');
  const container = document.getElementById('project-edit-container-' + id);
  if (!container) return;
  const p = state.projects.find(pr=>pr.id===id);
  if (!p) return;
  container.innerHTML = `
    <div class="step-form">
      <input type="text" class="text-input proj-edit-name" placeholder="Project name" value="${escapeHtml(p.name)}">
      <select class="text-input proj-edit-area">
        <option value="research" ${p.area==='research'?'selected':''}>Research</option>
        <option value="grants" ${p.area==='grants'?'selected':''}>Grants</option>
        <option value="writing" ${p.area==='writing'?'selected':''}>Writing</option>
        <option value="personal" ${p.area==='personal'?'selected':''}>Personal</option>
        <option value="creative" ${p.area==='creative'?'selected':''}>Creative</option>
      </select>
      <div>
        <div class="muted-sm" style="margin-bottom:4px;">Priority (optional, lower number = higher priority)</div>
        <input type="number" class="text-input proj-edit-priority" placeholder="e.g. 1" min="1" step="1" value="${p.priority ? escapeHtml(String(p.priority)) : ''}">
      </div>
      <input type="url" class="text-input proj-edit-doclink" placeholder="Link (optional)" value="${p.doc_link ? escapeHtml(p.doc_link) : ''}">
      <textarea class="text-input proj-edit-notes" placeholder="Notes (optional)" rows="2">${p.notes ? escapeHtml(p.notes) : ''}</textarea>
      <div class="form-actions">
        <button data-action="save-project-edit" data-id="${id}" class="btn-primary">Save</button>
        <button data-action="cancel-project-edit" data-id="${id}" class="btn-ghost">Cancel</button>
      </div>
    </div>
  `;
  container.querySelector('.proj-edit-name').focus();
}

function saveProjectEdit(id){
  const container = document.getElementById('project-edit-container-' + id);
  if (!container) return;
  const p = state.projects.find(pr=>pr.id===id);
  if (!p) return;
  const name = container.querySelector('.proj-edit-name').value.trim();
  if (!name){ alert('Project needs a name.'); return; }
  p.name = name;
  p.area = container.querySelector('.proj-edit-area').value;
  p.priority = container.querySelector('.proj-edit-priority').value.trim();
  p.doc_link = container.querySelector('.proj-edit-doclink').value.trim();
  p.notes = container.querySelector('.proj-edit-notes').value.trim();
  saveState();
  renderAll();
}

function deleteStep(id){
  if (!confirm('Delete this task?')) return;
  state.steps = state.steps.filter(s=>s.id!==id);
  saveState();
  renderAll();
}

function quickSetStatus(id, status, originEl){
  const step = state.steps.find(s=>s.id===id);
  if (!step) return;
  const becameDone = status === 'done' && step.status !== 'done';
  step.status = status;
  step.updated_at = todayISO();
  saveState();
  renderAll();
  if (becameDone && originEl){
    const r = originEl.getBoundingClientRect();
    triggerConfetti(r.left + r.width/2, r.top + r.height/2);
  }
}

function jumpToProject(id){
  if (!id) return;
  ui.expanded.add(id);
  renderProjectsList();
  const rowEl = document.getElementById('proj-'+id);
  if (rowEl) rowEl.scrollIntoView({behavior: window.matchMedia('(prefers-reduced-motion: reduce)').matches ? 'auto' : 'smooth', block:'center'});
}

function toggleExpand(id){
  const body = document.getElementById('proj-body-'+id);
  const arrow = document.getElementById('proj-arrow-'+id);
  if (!body) return;
  const nowHidden = body.classList.toggle('hidden');
  if (arrow) arrow.textContent = nowHidden ? '▸' : '▾';
  if (nowHidden) ui.expanded.delete(id); else ui.expanded.add(id);
  updateExpandAllButton();
}

/* ---- filters ---- */
function setAreaFilter(area){
  ui.areaFilter = area;
  document.querySelectorAll('.area-filter-btn').forEach(b=>b.classList.toggle('active', b.dataset.area===area));
  applyFilters();
}
function applyFilters(){
  const q = ui.searchQuery.trim().toLowerCase();
  document.querySelectorAll('.project-row').forEach(row=>{
    const areaMatch = ui.areaFilter === 'all' || row.dataset.area === ui.areaFilter;
    const searchMatch = !q || row.dataset.search.includes(q);
    const archived = row.dataset.archived === 'true';
    const someday = row.dataset.someday === 'true';
    const archiveOk = !archived || ui.showArchived || (q !== '' && searchMatch);
    const somedayOk = !someday || ui.showSomeday || (q !== '' && searchMatch);
    row.style.display = (areaMatch && searchMatch && archiveOk && somedayOk) ? '' : 'none';
  });
  document.querySelectorAll('.step-row').forEach(row=>{
    const done = row.dataset.done === 'true';
    const stepSearchMatch = !q || row.dataset.search.includes(q);
    const completedOk = !done || ui.showCompletedTasks || (q !== '' && stepSearchMatch);
    row.style.display = completedOk ? '' : 'none';
  });
}

/* ---- backup / restore ---- */
function openBackupModal(){
  document.getElementById('modal-content').innerHTML = `
    <h3>Backup &amp; restore</h3>
    <p class="muted-sm">Copy this somewhere safe as a backup, or paste a previous backup below to restore it.</p>
    <textarea class="text-input" id="backup-output" rows="8" readonly>${escapeHtml(JSON.stringify(state, null, 2))}</textarea>
    <div class="form-actions"><button class="btn-ghost" data-action="select-backup-text">Select all</button></div>
    <hr>
    <textarea class="text-input" id="restore-input" rows="8" placeholder="Paste backup JSON here to restore"></textarea>
    <div class="form-actions">
      <button class="btn-primary" data-action="restore-backup">Restore from pasted backup</button>
      <button class="btn-ghost danger" data-action="reset-all">Clear all data</button>
      <button class="btn-ghost" data-action="close-modal">Close</button>
    </div>
  `;
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function closeModal(){ document.getElementById('modal-overlay').classList.add('hidden'); }

function openSettingsModal(){
  const connected = state.settings.driveSyncEnabled && state.settings.googleClientId;
  const lastSync = state.synced_at
    ? 'Last synced ' + new Date(state.synced_at).toLocaleString([], { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' })
    : 'Never synced';
  document.getElementById('modal-content').innerHTML = `
    <h3>Settings</h3>
    <p class="muted-sm">Tweak a few things to match how you work.</p>
    <div style="margin-bottom:14px;">
      <label class="muted-sm" style="display:block;margin-bottom:4px;">Remind me about a task if it hasn't moved in (days)</label>
      <input type="number" class="text-input" id="settings-stale-days" min="1" step="1" value="${state.settings.staleDays}">
    </div>
    <div class="form-actions">
      <button class="btn-primary" data-action="save-settings">Save</button>
      <button class="btn-ghost" data-action="close-modal">Cancel</button>
    </div>
    <hr style="border:none;border-top:1px solid var(--rule);margin:16px 0;">
    <h4 style="margin:0 0 8px;font-size:14px;">Data</h4>
    <div class="form-actions" style="margin-bottom:0;">
      <button class="btn-ghost" data-action="open-bulk-add-from-settings">Bulk add projects</button>
      <button class="btn-ghost" data-action="open-backup-from-settings">Backup &amp; restore</button>
    </div>
    <hr style="border:none;border-top:1px solid var(--rule);margin:16px 0;">
    <h4 style="margin:0 0 6px;font-size:14px;">Google Drive sync</h4>
    <p class="muted-sm" style="margin-bottom:12px;">Keep your data in sync across devices. Requires a free Google Cloud project — <a href="https://github.com/DanielSprockett/golden-hour#drive-sync-setup" target="_blank" rel="noopener noreferrer" style="color:var(--indigo);">see setup guide ↗</a></p>
    ${connected ? `
      <div class="muted-sm" style="margin-bottom:10px;">✓ Connected · ${lastSync}</div>
      <div id="drive-sync-status" class="muted-sm" style="min-height:18px;margin-bottom:10px;"></div>
      <div class="form-actions" style="margin-bottom:0;">
        <button class="btn-ghost" data-action="drive-sync-now">Sync now</button>
        <button class="btn-ghost danger" data-action="drive-disconnect">Disconnect</button>
      </div>
    ` : `
      <div style="margin-bottom:10px;">
        <label class="muted-sm" style="display:block;margin-bottom:4px;">Google OAuth Client ID</label>
        <input type="text" class="text-input" id="drive-client-id-input" placeholder="paste your client ID here" value="${escapeHtml(state.settings.googleClientId || '')}">
      </div>
      <div id="drive-sync-status" class="muted-sm" style="min-height:18px;margin-bottom:10px;"></div>
      <div class="form-actions" style="margin-bottom:0;">
        <button class="btn-primary" data-action="drive-connect">Connect Drive</button>
      </div>
    `}
  `;
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function saveSettings(){
  const raw = document.getElementById('settings-stale-days').value;
  const days = parseInt(raw, 10);
  if (!isNaN(days) && days > 0) state.settings.staleDays = days;
  saveState();
  closeModal();
  renderAll();
}

function restoreBackup(){
  const raw = document.getElementById('restore-input').value.trim();
  if (!raw) return;
  try{
    const parsed = JSON.parse(raw);
    if (!parsed || !Array.isArray(parsed.projects) || !Array.isArray(parsed.steps)) throw new Error('bad shape');
    state = parsed;
    saveState();
    closeModal();
    renderAll();
  }catch(e){
    alert('That does not look like a valid backup.');
  }
}
function resetAll(){
  if (!confirm("Heads up — this can't be undone. This deletes every project and task.")) return;
  state = { projects: [], steps: [] };
  saveState();
  closeModal();
  renderAll();
}

/* ---- event delegation ---- */
function handleClick(e){
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.dataset.action;
  const id = el.dataset.id;
  switch(action){
    case 'toggle-expand': toggleExpand(id); break;
    case 'open-add-project':
      document.getElementById('add-project-panel').classList.toggle('hidden');
      document.getElementById('bulk-add-panel').classList.add('hidden');
      break;
    case 'open-bulk-add':
      document.getElementById('bulk-add-panel').classList.toggle('hidden');
      document.getElementById('add-project-panel').classList.add('hidden');
      break;
    case 'save-project': saveNewProject(); break;
    case 'save-bulk-add': saveBulkAdd(); break;
    case 'delete-project': deleteProject(id); break;
    case 'toggle-archive-project': toggleArchiveProject(id); break;
    case 'open-project-edit': {
      ui.expanded.add(id);
      const body = document.getElementById('proj-body-'+id);
      if (body) body.classList.remove('hidden');
      const arrow = document.getElementById('proj-arrow-'+id);
      if (arrow) arrow.textContent = '▾';
      openProjectEditForm(id);
      break;
    }
    case 'save-project-edit': saveProjectEdit(id); break;
    case 'cancel-project-edit': {
      const c = document.getElementById('project-edit-container-'+id);
      if (c) c.innerHTML = '';
      break;
    }
    case 'open-step-form': {
      ui.expanded.add(id);
      const body = document.getElementById('proj-body-'+id);
      if (body) body.classList.remove('hidden');
      const arrow = document.getElementById('proj-arrow-'+id);
      if (arrow) arrow.textContent = '▾';
      openStepForm(id, el.dataset.stepId || null);
      break;
    }
    case 'save-step': saveStepForm(el.dataset.projectId, el.dataset.stepId || null); break;
    case 'cancel-step-form': {
      const c = document.getElementById('step-form-container-'+id);
      if (c) c.innerHTML = '';
      break;
    }
    case 'delete-step': deleteStep(id); break;
    case 'quick-status': quickSetStatus(id, el.dataset.status, el); break;
    case 'set-area-filter': setAreaFilter(el.dataset.area); break;
    case 'toggle-expand-all': toggleExpandAll(); break;
    case 'toggle-now-rail': toggleNowRail(); break;
    case 'toggle-summary': toggleSummary(); break;
    case 'toggle-show-completed': toggleShowCompleted(); break;
    case 'toggle-show-archived': toggleShowArchived(); break;
    case 'toggle-show-someday': toggleShowSomeday(); break;
    case 'toggle-theme': toggleTheme(); break;
    case 'toggle-someday-project': toggleSomedayProject(id); break;
    case 'open-backup': openBackupModal(); break;
    case 'open-backup-from-settings': closeModal(); openBackupModal(); break;
    case 'open-bulk-add-from-settings': closeModal(); document.getElementById('bulk-add-panel').classList.remove('hidden'); document.getElementById('bulk-add-panel').scrollIntoView({behavior:'smooth'}); break;
    case 'close-modal': closeModal(); break;
    case 'open-settings': openSettingsModal(); break;
    case 'save-settings': saveSettings(); break;
    case 'drive-connect': driveConnectAndSync(); break;
    case 'drive-sync-now': driveSyncNow(); break;
    case 'drive-disconnect': driveDisconnect(); break;
    case 'print-project-report': printProjectReport(id); break;
    case 'restore-backup': restoreBackup(); break;
    case 'reset-all': resetAll(); break;
    case 'jump-to-project': jumpToProject(id); break;
    case 'select-backup-text': {
      const ta = document.getElementById('backup-output');
      if (ta) ta.select();
      break;
    }
  }
}

function renderAll(){
  renderNowRail();
  renderOverview();
  renderProjectsList();
}

async function init(){
  renderShell();
  document.getElementById('app').addEventListener('click', handleClick);
  document.getElementById('app').addEventListener('input', (e)=>{
    if (e.target.id === 'search-input'){ ui.searchQuery = e.target.value; applyFilters(); }
  });
  document.getElementById('modal-overlay').addEventListener('click', (e)=>{
    if (e.target.id === 'modal-overlay') closeModal();
  });
  document.addEventListener('keydown', (e)=>{
    const tag = (e.target.tagName || '').toLowerCase();
    const isEditable = tag === 'input' || tag === 'textarea' || tag === 'select' || e.target.isContentEditable;
    if (e.key === '/' && !isEditable){
      e.preventDefault();
      const search = document.getElementById('search-input');
      if (search) search.focus();
    } else if (e.key === 'Escape'){
      const modal = document.getElementById('modal-overlay');
      if (modal && !modal.classList.contains('hidden')) closeModal();
    }
  });
  await loadState();
  applyTheme();
  renderAll();
  driveTrySilentSync(); // non-blocking, best-effort
}
init();
</script>
</body>
</html>
